# W4DA realtime multiplayer worker (Rust).
# The database is EXTERNAL — configure DATABASE_URL in server/.env.
services:
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: w4da-worker:latest
    container_name: w4da-worker
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "8059:8059"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8059}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Optional: local Postgres for development only ---
  # The production DB is external; uncomment this to test locally and set
  # DATABASE_URL=postgres://w4da:w4da@db:5432/w4da in server/.env
