# ==========================================================================
#  W4DA — Horse Rider Survival  ·  nginx site config for w4da.com
# --------------------------------------------------------------------------
#  Serves the Vite production build (SPA) from /var/www/w4da.com/dist.
#
#  Install:
#    sudo cp deploy/nginx/w4da.com.conf /etc/nginx/sites-available/w4da.com
#    sudo ln -s /etc/nginx/sites-available/w4da.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  TLS (Let's Encrypt):
#    sudo certbot --nginx -d w4da.com -d www.w4da.com
#    (certbot fills in the ssl_certificate lines below automatically)
# ==========================================================================

# --- IP logging -----------------------------------------------------------
#  Custom log format that records the client IP. Behind a reverse proxy / CDN
#  the direct peer is the proxy, so we also log X-Forwarded-For to keep the
#  real visitor IP. (This block sits in the http{} context via `include`.)
log_format w4da_ip
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'xff="$http_x_forwarded_for" rt=$request_time';

#  If nginx is behind a trusted proxy/CDN (e.g. Cloudflare), uncomment and set
#  the proxy ranges so $remote_addr becomes the real client IP in the logs:
#    set_real_ip_from 10.0.0.0/8;
#    set_real_ip_from 173.245.48.0/20;   # example: Cloudflare range
#    real_ip_header   X-Forwarded-For;
#    real_ip_recursive on;

# --- HTTP: redirect everything to HTTPS -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name w4da.com www.w4da.com;

    access_log /var/log/nginx/w4da.com.access.log w4da_ip;
    error_log  /var/log/nginx/w4da.com.error.log warn;

    # Allow ACME http-01 challenges before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Redirect www -> apex over HTTPS --------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.w4da.com;

    ssl_certificate     /etc/letsencrypt/live/w4da.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/w4da.com/privkey.pem;

    return 301 https://w4da.com$request_uri;
}

# --- Main HTTPS site ------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name w4da.com;

    root /var/www/w4da.com/dist;
    index index.html;

    # ----- Access / error logging (client IP) -----------------------------
    access_log /var/log/nginx/w4da.com.access.log w4da_ip;
    error_log  /var/log/nginx/w4da.com.error.log warn;

    # ----- TLS ------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/w4da.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/w4da.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ----- Security headers ----------------------------------------------
    add_header X-Frame-Options            "SAMEORIGIN"        always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=(), fullscreen=(self)" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

    # ----- Compression ----------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/wasm application/octet-stream;

    # Serve pre-compressed .br / .gz assets if present (optional modules).
    # brotli            on;
    # brotli_static     on;
    gzip_static       on;

    # ----- Hashed, immutable build assets ---------------------------------
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WebAssembly (BabylonJS may stream .wasm) served with correct type.
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Long-cache other static media.
    location ~* \.(?:svg|png|jpg|jpeg|gif|ico|webp|woff2?|ttf|mp3|ogg|wav)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ----- SPA fallback: every route resolves to index.html ---------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached so new deploys are picked up instantly.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /favicon.svg {
        access_log off;
        expires 7d;
    }

    # Block dotfiles (.git, .env, ...).
    location ~ /\.(?!well-known) {
        deny all;
    }
}
